name: Build docker images

on:
  workflow_dispatch:

jobs:
  multi-registries:
    runs-on: ubuntu-24.04
    steps:
      - name: Get current date
        id: current_date_time
        uses: kaven-universe/github-action-current-date-time@v1
        with:
          format: "YYYYMMDDHHmmss"
      
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve current commit tag
        id: current_commit_tag
        shell: bash
        run: |
          tag="$(git tag --points-at HEAD --sort=-version:refname | head -n 1)"
          if [ -n "$tag" ]; then
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "has_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            kavenzero/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.current_commit_tag.outputs.tag }},enable=${{ steps.current_commit_tag.outputs.has_tag == 'true' }}
            type=ref,event=branch
            type=raw,value=${{ steps.current_date_time.outputs.time }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      # - name: Cache Docker layers
      #   uses: actions/cache@v3
      #   with:
      #     path: /tmp/.buildx-cache
      #     key: ${{ runner.os }}-buildx-${{ github.sha }}
      #     restore-keys: |
      #       ${{ runner.os }}-buildx-
      
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER  }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          # cache-from: type=local,src=/tmp/.buildx-cache
          # cache-to: type=local,dest=/tmp/.buildx-cache
